name: db-isolation

# Runs the Phase 0 tenant-isolation suite on every push / PR.
# Spins up a throwaway Postgres, applies the schema, seeds two test
# restaurants, runs the isolation assertions, and runs the RLS guard.
# If any tenant can see another tenant's data, the build fails.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  isolation-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: appdb
      # Fail the whole run on the first SQL error, not just the last.
      PSQL: psql -v ON_ERROR_STOP=1 --no-psqlrc

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply CI auth shim
        run: $PSQL -f db/phase0/00_ci_shim.sql

      - name: Apply schema
        run: $PSQL -f db/phase0/01_schema.sql

      - name: Seed test tenants
        run: $PSQL -f db/phase0/02_seed.sql

      - name: Run isolation tests
        run: $PSQL -f db/phase0/03_isolation_tests.sql

      - name: Run RLS guard
        run: $PSQL -f db/phase0/ci_rls_guard.sql
